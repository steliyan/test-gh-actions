name: Auto merge

on: pull_request

permissions:
  contents: write
  pull-requests: write


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Auto-merge Pull Request
        run: gh pr merge --squash --auto "${{ PR_URL }}"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{github.event.pull_request.html_url}}
